<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Nomona Cookies</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="padding:2rem;">
    <h1>📊 Dashboard Admin</h1>

    <div class="grid grid-4" id="statsBox" style="margin-top:2rem;"></div>

    <div class="card" style="margin-top:2rem;">
      <h2>🧾 Order Terbaru</h2>
      <div id="recentOrders"></div>
    </div>
  </div>

<script>
fetch('/admin/stats')
.then(res => res.json())
.then(data => {
  document.getElementById('statsBox').innerHTML = `
    <div class="card">
      <h3>Total Produk</h3>
      <p>${data.totalProducts}</p>
    </div>

    <div class="card">
      <h3>Total Order</h3>
      <p>${data.totalOrders}</p>
    </div>

    <div class="card">
      <h3>Pending</h3>
      <p>${data.pendingOrders}</p>
    </div>

    <div class="card">
      <h3>Pendapatan</h3>
      <p>Rp ${data.totalRevenue.toLocaleString()}</p>
    </div>
  `;

  document.getElementById('recentOrders').innerHTML = data.recentOrders.map(o => `
    <div class="product-card" style="margin-top:1rem;">
      <h3>${o.customer_name}</h3>
      <p>Total: Rp ${o.total.toLocaleString()}</p>
      <p>Status: ${o.status}</p>
    </div>
  `).join('');
})
</script>
</body>
</html>
