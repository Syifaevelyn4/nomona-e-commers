<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nomona Cookies</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-decoration {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .deco-circle {
      position: absolute; border-radius: 50%;
      background: var(--secondary); opacity: 0.5;
    }
    .deco-circle:nth-child(1) { width: 400px; height: 400px; top: -150px; right: -100px; }
    .deco-circle:nth-child(2) { width: 250px; height: 250px; bottom: -80px; left: -60px; background: #ffd1d8; }
  </style>
</head>
<body>
  <div class="auth-decoration">
    <div class="deco-circle"></div>
    <div class="deco-circle"></div>
  </div>
  <div class="auth-wrapper" style="position:relative;z-index:1;">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="width:60px;height:60px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem;">🍪</div>
        <h1>Nomona Cookies</h1>
        <p>Premium Bakery Store</p>
      </div>
      <h2 class="auth-title">Selamat Datang Kembali</h2>
      <p class="auth-sub">Masuk untuk melanjutkan belanja cookies premium</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Masukkan username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-input" placeholder="Masukkan password" required autocomplete="current-password" style="padding-right:3rem;">
            <button type="button" onclick="togglePassword('password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;cursor:pointer;">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Masuk</button>
      </form>

      <div class="auth-footer">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </div>
      <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
        <a href="admin.html" style="font-size:0.8rem;color:var(--text-muted);">👑 Login sebagai Admin</a>
      </div>
    </div>
  </div>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    fetch('/me').then(r => r.json()).then(d => {
      if (d.loggedIn && !d.isAdmin) window.location.href = 'index.html';
    });
  </script>
</body>
</html>
