<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Nomona Cookies</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: 2.5rem; max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
    .checkout-section { background: white; border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-card); margin-bottom: 1.5rem; }
    .checkout-section-title { font-family: var(--font-display); font-size: 1.15rem; color: var(--text); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
    .order-item-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-img { width: 52px; height: 52px; border-radius: var(--radius-sm); object-fit: cover; }
    .order-item-info { flex: 1; }
    .order-item-name { font-weight: 600; font-size: 0.875rem; }
    .order-item-qty { font-size: 0.8rem; color: var(--text-light); }
    .order-item-price { font-weight: 700; color: var(--primary); font-size: 0.9rem; }
    .order-summary-total { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--primary); border-top: 2px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; }
    @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><div class="nav-logo-icon">🍪</div>Nomona <span class="dot">·</span> Cookies</a>
    <ul class="nav-links">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="shop.html">Toko</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="cart-icon-btn">🛒<span class="cart-badge" style="display:none">0</span></a>
      <div id="navLoginBtn"><a href="login.html" class="btn-nav">Masuk</a></div>
      <div id="navUserMenu" style="display:none;align-items:center;gap:0.75rem;">
        <a href="profile.html" style="font-size:0.875rem;font-weight:600;color:var(--primary)" id="navUsername">User</a>
        <button onclick="logout()" class="btn-nav" style="background:var(--secondary);color:var(--primary);">Keluar</button>
      </div>
    </div>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu">
    <ul>
      <li><a href="index.html">🏠 Beranda</a></li>
      <li><a href="shop.html">🛍️ Toko</a></li>
      <li><a href="cart.html">🛒 Keranjang</a></li>
    </ul>
  </div>

  <div class="page-hero">
    <div style="font-size:2rem;margin-bottom:0.5rem;">📋</div>
    <h1>Checkout</h1>
    <p>Lengkapi data pengiriman dan pesan sekarang</p>
  </div>

  <div class="checkout-layout">
    <!-- Form -->
    <div>
      <div class="checkout-section">
        <h3 class="checkout-section-title">📦 Data Pengiriman</h3>
        <form id="checkoutForm">
          <div class="form-group">
            <label class="form-label" for="customerName">Nama Penerima *</label>
            <input type="text" id="customerName" class="form-input" placeholder="Nama lengkap penerima" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="address">Alamat Lengkap *</label>
            <textarea id="address" class="form-input" rows="3" placeholder="Jalan, no. rumah, RT/RW, kelurahan, kecamatan, kota" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="whatsapp">Nomor WhatsApp *</label>
            <input type="tel" id="whatsapp" class="form-input" placeholder="08xxxxxxxxxx" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="note">Catatan Pesanan (Opsional)</label>
            <textarea id="note" class="form-input" rows="2" placeholder="Contoh: Tolong dikemas extra hati-hati, ada yang dipecah..."></textarea>
          </div>
        </form>
      </div>

      <div class="checkout-section" style="background:var(--secondary);border:2px solid var(--primary-light);">
        <h3 class="checkout-section-title">💳 Metode Pembayaran</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem;">
          <label style="cursor:pointer;">
            <input type="radio" name="payment" value="transfer" checked style="display:none;">
            <div class="payment-option active" id="pay_transfer" onclick="selectPayment('transfer')" style="background:white;border:2px solid var(--primary);border-radius:var(--radius-sm);padding:1rem;text-align:center;">
              <div style="font-size:1.5rem;margin-bottom:0.5rem;">🏦</div>
              <div style="font-size:0.875rem;font-weight:600;">Transfer Bank</div>
            </div>
          </label>
          <label style="cursor:pointer;">
            <input type="radio" name="payment" value="cod" style="display:none;">
            <div class="payment-option" id="pay_cod" onclick="selectPayment('cod')" style="background:white;border:2px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;">
              <div style="font-size:1.5rem;margin-bottom:0.5rem;">💵</div>
              <div style="font-size:0.875rem;font-weight:600;">Bayar di Tempat</div>
            </div>
          </label>
          <label style="cursor:pointer;">
            <input type="radio" name="payment" value="qris" style="display:none;">
            <div class="payment-option" id="pay_qris" onclick="selectPayment('qris')" style="background:white;border:2px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;">
              <div style="font-size:1.5rem;margin-bottom:0.5rem;">📱</div>
              <div style="font-size:0.875rem;font-weight:600;">QRIS</div>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div>
      <div class="checkout-section" style="position:sticky;top:90px;">
        <h3 class="checkout-section-title">🛒 Ringkasan Pesanan</h3>
        <div id="orderItemsList"></div>
        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;font-size:0.875rem;color:var(--text-light)">
            <span>Subtotal</span><span id="checkoutSubtotal">Rp 0</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;font-size:0.875rem;color:var(--text-light)">
            <span>Ongkir</span><span style="color:#22c55e">Gratis</span>
          </div>
        </div>
        <div class="order-summary-total"><span>Total</span><span id="checkoutTotal">Rp 0</span></div>

        <button onclick="submitCheckout()" class="btn btn-primary" style="width:100%;margin-top:1.5rem;justify-content:center;font-size:1rem;padding:1rem;" id="submitBtn">
          ✅ Konfirmasi Pesanan
        </button>
        <a href="cart.html" class="btn btn-ghost" style="width:100%;margin-top:0.75rem;justify-content:center;">← Kembali ke Keranjang</a>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom"><p>© 2024 Nomona Cookies</p></div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    function selectPayment(type) {
      ['transfer','cod','qris'].forEach(t => {
        const el = document.getElementById(`pay_${t}`);
        el.style.borderColor = t === type ? 'var(--primary)' : 'var(--border)';
      });
    }

    function renderOrderSummary() {
      const cart = getCart();
      if (cart.length === 0) { window.location.href = 'cart.html'; return; }
      const total = getCartTotal();
      document.getElementById('checkoutSubtotal').textContent = formatRupiah(total);
      document.getElementById('checkoutTotal').textContent = formatRupiah(total);
      document.getElementById('orderItemsList').innerHTML = cart.map(item => `
        <div class="order-item-row">
          <img src="/images/${item.image || 'placeholder.svg'}" alt="${item.name}" class="order-item-img" onerror="this.src='/images/placeholder.svg'">
          <div class="order-item-info">
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-qty">× ${item.quantity}</div>
          </div>
          <div class="order-item-price">${formatRupiah(item.price * item.quantity)}</div>
        </div>
      `).join('');
    }

    async function submitCheckout() {
      const name = document.getElementById('customerName').value.trim();
      const address = document.getElementById('address').value.trim();
      const whatsapp = document.getElementById('whatsapp').value.trim();
      const note = document.getElementById('note').value.trim();
      const cart = getCart();

      if (!name) { showToast('Nama penerima wajib diisi', 'error'); return; }
      if (!address) { showToast('Alamat pengiriman wajib diisi', 'error'); return; }
      if (!whatsapp) { showToast('Nomor WhatsApp wajib diisi', 'error'); return; }
      if (cart.length === 0) { showToast('Keranjang kosong', 'error'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Memproses...';

      const items = cart.map(i => ({ product_name: i.name, price: i.price, quantity: i.quantity }));
      try {
        const res = await fetch('/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customer_name: name, address, whatsapp, note, items })
        });
        const data = await res.json();
        if (data.error) { showToast(data.error, 'error'); btn.disabled = false; btn.textContent = '✅ Konfirmasi Pesanan'; return; }
        clearCart();
        window.location.href = `order-success.html?id=${data.orderId}`;
      } catch {
        showToast('Terjadi kesalahan, coba lagi', 'error');
        btn.disabled = false; btn.textContent = '✅ Konfirmasi Pesanan';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderOrderSummary();
      // Pre-fill name if logged in
      fetch('/me').then(r => r.json()).then(d => {
        if (d.loggedIn && d.user) {
          const nameEl = document.getElementById('customerName');
          if (!nameEl.value) nameEl.value = d.user.username;
        }
      });
    });
  </script>
</body>
</html>
