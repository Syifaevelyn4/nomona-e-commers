<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Produk — Nomona Cookies</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
    .detail-img-wrap { position: sticky; top: 90px; }
    .detail-img { width: 100%; border-radius: var(--radius); box-shadow: var(--shadow-lg); object-fit: cover; height: 420px; }
    .detail-category { color: var(--primary); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .detail-name { font-family: var(--font-display); font-size: 2.2rem; color: var(--text); margin-bottom: 0.75rem; line-height: 1.2; }
    .detail-price { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 1.5rem; }
    .detail-desc { color: var(--text-light); line-height: 1.8; margin-bottom: 2rem; }
    .detail-qty { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .detail-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .detail-badges { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .detail-badge-item { display: flex; align-items: center; gap: 8px; font-size: 0.825rem; color: var(--text-light); }
    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; gap: 2rem; }
      .detail-img-wrap { position: static; }
      .detail-img { height: 280px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><div class="nav-logo-icon">🍪</div>Nomona <span class="dot">·</span> Cookies</a>
    <ul class="nav-links">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="shop.html">Toko</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="cart-icon-btn">🛒<span class="cart-badge" style="display:none">0</span></a>
      <div id="navLoginBtn"><a href="login.html" class="btn-nav">Masuk</a></div>
      <div id="navUserMenu" style="display:none;align-items:center;gap:0.75rem;">
        <a href="profile.html" style="font-size:0.875rem;font-weight:600;color:var(--primary)" id="navUsername">User</a>
        <button onclick="logout()" class="btn-nav" style="background:var(--secondary);color:var(--primary);">Keluar</button>
      </div>
    </div>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu">
    <ul>
      <li><a href="index.html">🏠 Beranda</a></li>
      <li><a href="shop.html">🛍️ Toko</a></li>
      <li><a href="cart.html">🛒 Keranjang</a></li>
    </ul>
  </div>

  <div class="page-container">
    <div class="breadcrumb">
      <a href="index.html">Beranda</a>
      <span>›</span>
      <a href="shop.html">Toko</a>
      <span>›</span>
      <span id="breadcrumbName">Detail Produk</span>
    </div>

    <div id="detailContent">
      <div class="detail-grid">
        <div class="detail-img-wrap">
          <div class="skeleton" style="height:420px;border-radius:var(--radius);"></div>
        </div>
        <div>
          <div class="skeleton" style="height:16px;width:80px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:40px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:32px;width:140px;margin-bottom:20px;"></div>
          <div class="skeleton" style="height:80px;margin-bottom:20px;"></div>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div style="margin-top:5rem;">
      <div class="section-header" style="text-align:left;">
        <span class="section-tag">🍪 Produk Terkait</span>
        <h2 class="section-title" style="font-size:1.5rem;">Mungkin Kamu Suka</h2>
      </div>
      <div id="relatedGrid" class="products-grid"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-grid">
      <div><h3 class="footer-brand-name">🍪 Nomona Cookies</h3><p class="footer-desc">Premium artisan cookies dibuat dengan cinta.</p></div>
    </div>
    <div class="footer-bottom"><p>© 2024 Nomona Cookies</p></div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentProduct = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = 'shop.html'; return; }

      try {
        const res = await fetch(`/product/${id}`);
        const data = await res.json();
        if (data.error) { window.location.href = 'shop.html'; return; }
        currentProduct = data.product;
        renderDetail(data.product);
        renderRelated(data.related);
      } catch (e) {
        document.getElementById('detailContent').innerHTML = '<p style="color:var(--text-light)">Gagal memuat produk</p>';
      }
    });

    function renderDetail(p) {
      document.title = `${p.name} — Nomona Cookies`;
      document.getElementById('breadcrumbName').textContent = p.name;
      const imgSrc = `/images/${p.image}`;
      document.getElementById('detailContent').innerHTML = `
        <div class="detail-grid">
          <div class="detail-img-wrap">
            <img src="${imgSrc}" alt="${p.name}" class="detail-img" onerror="this.src='/images/placeholder.svg'">
          </div>
          <div>
            <div class="detail-category">🏷️ ${p.category}</div>
            <h1 class="detail-name">${p.name}</h1>
            <div class="detail-price">${formatRupiah(p.price)}</div>
            <p class="detail-desc">${p.description || 'Cookies premium berkualitas tinggi dari Nomona Cookies.'}</p>
            <div class="detail-qty">
              <div>
                <div style="font-size:0.8rem;font-weight:600;color:var(--text-light);margin-bottom:8px;">JUMLAH</div>
                <div class="qty-selector">
                  <button class="qty-btn" onclick="changeQty(-1)">−</button>
                  <input type="number" class="qty-input" id="qtyInput" value="1" min="1" max="99" readonly>
                  <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
              </div>
              <div>
                <div style="font-size:0.8rem;font-weight:600;color:var(--text-light);margin-bottom:8px;">STOK</div>
                <div style="font-weight:600;color:#22c55e;">✅ ${p.stock} tersedia</div>
              </div>
            </div>
            <div class="detail-actions">
              <button class="btn btn-primary btn-lg" onclick="addProductToCart()">🛒 Tambah ke Keranjang</button>
              <a href="cart.html" class="btn btn-outline btn-lg">Lihat Keranjang</a>
            </div>
            <div class="detail-badges">
              <div class="detail-badge-item">🌿 <span>Bahan alami premium</span></div>
              <div class="detail-badge-item">👐 <span>Handmade with love</span></div>
              <div class="detail-badge-item">📦 <span>Packaging aman</span></div>
              <div class="detail-badge-item">✅ <span>Tanpa pengawet</span></div>
            </div>
          </div>
        </div>
      `;
    }

    function renderRelated(products) {
      const grid = document.getElementById('relatedGrid');
      if (!products || products.length === 0) { grid.style.display = 'none'; return; }
      grid.innerHTML = products.map(renderProductCard).join('');
    }

    function changeQty(delta) {
      const input = document.getElementById('qtyInput');
      const newVal = Math.max(1, Math.min(99, parseInt(input.value) + delta));
      input.value = newVal;
    }

    function addProductToCart() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('qtyInput').value);
      addToCart({ ...currentProduct, quantity: qty });
      showToast(`🍪 ${currentProduct.name} × ${qty} ditambahkan ke keranjang!`);
    }
  </script>
</body>
</html>
